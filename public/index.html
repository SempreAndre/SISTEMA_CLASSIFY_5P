<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="TrustDoc — Sistema seguro de leitura de documentos confidenciais. Login com teclado virtual e verificação anti-robô." />
  <title>TrustDoc — Login Seguro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="grid-pattern"></div>

  <!-- ===== LOGIN CONTAINER ===== -->
  <div class="login-container">

    <!-- BRAND -->
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6z" />
          <polyline points="14 2 14 8 20 8" />
          <rect x="8" y="13" width="8" height="1" rx="0.5" />
          <rect x="8" y="16" width="5" height="1" rx="0.5" />
        </svg>
      </div>
      <h1>TrustDoc</h1>
      <p>Acesso seguro a documentos confidenciais</p>
    </div>

    <!-- LOGIN CARD -->
    <div class="login-card">
      <form id="loginForm" autocomplete="off">

        <!-- USUÁRIO -->
        <div class="form-group">
          <label for="username">Usuário</label>
          <div class="input-wrapper">
            <input
              type="text"
              id="username"
              class="form-input"
              placeholder="Digite seu usuário"
              autocomplete="off"
              spellcheck="false"
            />
            <svg viewBox="0 0 24 24">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
          </div>
        </div>

        <!-- SENHA -->
        <div class="form-group">
          <label>Senha <span style="font-weight: 400; text-transform: none; letter-spacing: 0; font-size: 11px; color: var(--text-muted)">— use o teclado virtual</span></label>
          <div class="password-display">
            <div class="input-wrapper" style="flex:1">
              <input
                type="password"
                id="password"
                class="form-input"
                placeholder="••••••"
                readonly
                tabindex="-1"
              />
              <svg viewBox="0 0 24 24">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
              </svg>
            </div>
            <div class="password-actions">
              <button type="button" id="btnBackspace" title="Apagar último caractere">
                <svg viewBox="0 0 24 24">
                  <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z" />
                  <line x1="18" y1="9" x2="12" y2="15" />
                  <line x1="12" y1="9" x2="18" y2="15" />
                </svg>
              </button>
              <button type="button" id="btnClear" title="Limpar senha">
                <svg viewBox="0 0 24 24">
                  <line x1="18" y1="6" x2="6" y2="18" />
                  <line x1="6" y1="6" x2="18" y2="18" />
                </svg>
              </button>
            </div>
          </div>
        </div>

        <!-- TECLADO VIRTUAL -->
        <div class="keyboard-section">
          <div class="keyboard-header">
            <span>
              <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2" /><path d="M6 8h.01M10 8h.01M14 8h.01M18 8h.01M6 12h.01M10 12h.01M14 12h.01M18 12h.01M7 16h10" /></svg>
              Teclado Virtual
            </span>
            <button type="button" class="shuffle-btn" id="btnShuffle" title="Embaralhar teclas">
              <svg viewBox="0 0 24 24"><polyline points="16 3 21 3 21 8" /><line x1="4" y1="20" x2="21" y2="3" /><polyline points="21 16 21 21 16 21" /><line x1="15" y1="15" x2="21" y2="21" /><line x1="4" y1="4" x2="9" y2="9" /></svg>
              Embaralhar
            </button>
          </div>
          <div class="keyboard-grid" id="keyboardGrid"></div>
        </div>

        <!-- CAPTCHA -->
        <div class="captcha-section">
          <div class="captcha-header">
            <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" /></svg>
            <span>Verificação Anti-Robô</span>
          </div>
          <div class="captcha-box">
            <div class="captcha-question" id="captchaQuestion">Carregando...</div>
            <input
              type="text"
              id="captchaInput"
              class="captcha-input"
              placeholder="?"
              maxlength="4"
              autocomplete="off"
            />
            <button type="button" class="captcha-refresh" id="btnRefreshCaptcha" title="Gerar novo desafio">
              <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10" /><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" /></svg>
            </button>
          </div>
        </div>

        <!-- SUBMIT -->
        <button type="submit" class="submit-btn" id="btnSubmit">
          <div class="btn-content">
            <span class="spinner"></span>
            <svg class="btn-icon" viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" /><polyline points="10 17 15 12 10 7" /><line x1="15" y1="12" x2="3" y2="12" /></svg>
            <span class="btn-text">Entrar no TrustDoc</span>
          </div>
        </button>

        <!-- MESSAGE -->
        <div class="message" id="loginMessage">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" /><line x1="12" y1="8" x2="12" y2="12" /><line x1="12" y1="16" x2="12.01" y2="16" /></svg>
          <span id="messageText"></span>
        </div>
      </form>
    </div>

    <!-- FOOTER -->
    <div class="login-footer">
      <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2" /><path d="M7 11V7a5 5 0 0 1 10 0v4" /></svg>
      <span>Conexão segura &bull; TrustDoc &copy; 2026</span>
    </div>
  </div>

  <!-- ===== SUCCESS OVERLAY ===== -->
  <div class="success-overlay" id="successOverlay">
    <div class="success-content">
      <div class="success-icon">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12" /></svg>
      </div>
      <h2>Acesso Autorizado</h2>
      <p>Redirecionando para seus documentos...</p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
